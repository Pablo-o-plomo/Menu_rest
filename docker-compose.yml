services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: menu
      POSTGRES_USER: menu
      POSTGRES_PASSWORD: menu
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
  app:
    build: .
    environment:
      DATABASE_URL: postgresql://menu:menu@db:5432/menu
      NEXTAUTH_SECRET: change_me
      NEXTAUTH_URL: http://localhost:3000
    ports: ["3000:3000"]
    depends_on: [db]
volumes:
  pg_data:
